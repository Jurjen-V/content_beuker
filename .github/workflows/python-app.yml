name: Twitch Clip Processor

on:
  workflow_dispatch: # Zodat je het handmatig kunt starten

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip' # Versnelt toekomstige runs

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install yt-dlp openai-whisper torch

      - name: Run Python script
        run: python twitch_auto.py
        env:
          # Als je API keys nodig hebt, zet ze hier:
          TWITCH_TOKEN: ${{ secrets.TWITCH_TOKEN }}

      - name: Upload resultaten
        uses: actions/upload-artifact@v4
        with:
          name: processed-clips
          path: output/
