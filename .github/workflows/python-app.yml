name: Twitch Clip Processor Daily

on:
  schedule:
    - cron: '0 9 * * *'  # dagelijks om 09:00 UTC
  workflow_dispatch:

jobs:
  process-clips:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        sudo apt update && sudo apt install ffmpeg -y
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Twitch auto script
      run: python twitch_auto.py

    - name: Upload processed clips
      uses: actions/upload-artifact@v4
      with:
        name: twitch-clips
        path: output/*.mp4
